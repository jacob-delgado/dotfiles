# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind a last-window

# General
set -g mouse on
setw -g mode-keys vi
set -ga terminal-overrides ",xterm-256color:Tc"   # true color

# Reload config
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Toggle synchronize-panes for the current window
bind C-s setw synchronize-panes

# Copy mode (vi). tmux-yank handles the system-clipboard piping.
bind -T copy-mode-vi v send-keys -X begin-selection

# Status line
set -g status-right '#{?pane_synchronized,#[bg=blue]SYNC#[default],} %H:%M %d-%b-%y'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'   # |/- splits, hjkl nav, HJKL resize
set -g @plugin 'tmux-plugins/tmux-yank'           # clipboard integration
set -g @plugin 'tmux-plugins/tmux-resurrect'      # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'      # auto-save and auto-restore
set -g @plugin 'sainnhe/tmux-fzf'                 # prefix + F → fzf picker
set -g @plugin 'dracula/tmux'                     # status-bar theme

# Optional plugins — uncomment if needed
#set -g @plugin 'tmux-plugins/tmux-logging'
#set -g @plugin 'tmux-plugins/tmux-sessionist'
#set -g @plugin 'jaclu/tmux-menus'
#set -g @plugin 'tmux-plugins/tmux-sidebar'

# Continuum: restore last session automatically when tmux starts
set -g @continuum-restore 'on'

# Bootstrap TPM on fresh machines
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TPM — keep this at the very bottom
run '~/.tmux/plugins/tpm/tpm'
