# btop config — see `btop --help` and the in-app menu for the full schema.
# Only the non-default settings are kept here; btop rewrites this file
# whenever you change settings in the TUI, so expect occasional churn.

# Dracula theme to match git/, lazygit/, and the overall palette.
color_theme = "dracula"

# Transparent background so btop inherits the terminal's bg.
theme_background = False

# Use 24-bit color when the terminal supports it (true color is enabled
# by tmux's terminal-overrides line).
truecolor = True

# Braille glyphs for graph lines — denser and prettier than block chars.
graph_symbol = "braille"

# Vim-style hjkl navigation everywhere.
vim_keys = True
