# btop config — see `btop --help` and the in-app menu for the full schema.
# Only the non-default settings are kept here; btop rewrites this file
# whenever you change settings in the TUI, so expect occasional churn.

# TTY theme: low-contrast, works on any terminal palette.
color_theme = "TTY"

# Vim-style hjkl navigation everywhere.
vim_keys = True

# Use truecolor when the terminal supports it (TMUX exports it via the
# terminal-overrides line in .tmux.conf).
truecolor = True

# Update interval in milliseconds.
update_ms = 2000

# Default to mouse + keyboard input.
proc_tree = False
