# lazygit config — see https://github.com/jesseduffield/lazygit/blob/master/docs/Config.md
# Keep this file lean; lazygit may rewrite parts when you change settings via the UI.

gui:
  # Dracula-ish theme to match git/ and btop/.
  theme:
    activeBorderColor:
      - "#bd93f9"
      - bold
    inactiveBorderColor:
      - "#6272a4"
    selectedLineBgColor:
      - "#44475a"
    optionsTextColor:
      - "#8be9fd"
  nerdFontsVersion: "3"
  showRandomTip: false
  showCommandLog: false               # hide the bottom command-log panel
  showFileTree: true                  # tree view in the files panel (default true; explicit)
  experimentalShowBranchHeads: true   # show branch heads in the commit log

git:
  # Render diffs through delta so the diff pane matches `git diff` in the terminal.
  paging:
    colorArg: always
    pager: delta --paging=never

os:
  editPreset: "vim"                   # `e` opens files in vim
