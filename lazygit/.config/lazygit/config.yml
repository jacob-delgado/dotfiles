# lazygit config — see https://github.com/jesseduffield/lazygit/blob/master/docs/Config.md
# Keep this file lean; lazygit may rewrite parts when you change settings via the UI.

gui:
  # Official Dracula theme — https://github.com/dracula/lazygit
  theme:
    activeBorderColor:
      - "#FF79C6"
      - bold
    inactiveBorderColor:
      - "#BD93F9"
    searchingActiveBorderColor:
      - "#8BE9FD"
      - bold
    optionsTextColor:
      - "#6272A4"
    selectedLineBgColor:
      - "#6272A4"
    inactiveViewSelectedLineBgColor:
      - bold
    cherryPickedCommitFgColor:
      - "#6272A4"
    cherryPickedCommitBgColor:
      - "#8BE9FD"
    markedBaseCommitFgColor:
      - "#8BE9FD"
    markedBaseCommitBgColor:
      - "#F1FA8C"
    unstagedChangesColor:
      - "#FF5555"
    defaultFgColor:
      - "#F8F8F2"
  nerdFontsVersion: "3"
  showRandomTip: false
  showCommandLog: false               # hide the bottom command-log panel
  showFileTree: true                  # tree view in the files panel (default true; explicit)
  experimentalShowBranchHeads: true   # show branch heads in the commit log

git:
  # Render diffs through delta so the diff pane matches `git diff` in the terminal.
  paging:
    colorArg: always
    pager: delta --paging=never

os:
  editPreset: "vim"                   # `e` opens files in vim

# Custom commands — invoke gh from inside lazygit.
# Contexts: 'global', 'commits', 'files', 'branches', 'remoteBranches', etc.
customCommands:
  - key: 'O'
    context: 'global'
    description: 'Open this branch''s PR in the browser'
    command: 'gh pr view --web'

  - key: 'C'
    context: 'global'
    description: 'Create a PR for the current branch (browser)'
    command: 'gh pr create --fill --web'

  - key: 'V'
    context: 'commits'
    description: 'Open the PR containing the selected commit in the browser'
    command: 'gh pr view --web {{.SelectedLocalCommit.Sha}}'

  - key: 'L'
    context: 'global'
    description: 'List my open PRs in this repo'
    command: 'gh pr list --author "@me"'
    output: terminal

  - key: 'X'
    context: 'global'
    description: 'Prune local branches whose PRs are merged (gh-poi)'
    command: 'gh poi'
    output: terminal
