include dracula.conf

font_family      JetBrainsMono Nerd Font Mono
font_size        12.0
bold_font        JetBrainsMono Nerd Font Mono Extra Bold
bold_italic_font JetBrainsMono Nerd Font Mono Extra Bold Italic

# --- Quality of life ---
enable_audio_bell    no
visual_bell_duration 0
confirm_os_window_close 0
scrollback_lines              10000
scrollback_pager_history_size 100
repaint_delay   8
input_delay     2
sync_to_monitor yes

# --- macOS ---
macos_option_as_alt                left
macos_titlebar_color               background
macos_quit_when_last_window_closed yes

# --- Remote control + shell integration ---
allow_remote_control yes
listen_on            unix:/tmp/kitty-{kitty_pid}
shell_integration    enabled

# --- Visual ---
window_padding_width 6
cursor_trail         0
tab_bar_edge         top
tab_bar_style        powerline
tab_powerline_style  slanted

# --- Windows / splits / layouts (macOS cmd maps) ---
# cmd is invisible to tmux and the shell, so none of this collides with the
# tmux C-a prefix. On Linux these cmd maps are simply inert and kitty's
# ctrl+shift (kitty_mod) defaults apply instead. See kitty/README.md.

# Default to the splits layout so cmd+d / cmd+shift+d split directionally;
# stack = zoom one split fullscreen. tall/fat/grid stay reachable via
# ctrl+shift+l (next_layout).
enabled_layouts splits,stack,tall,fat,grid

# Splits, keeping the current working directory. Repurposes the macOS defaults
# cmd+d=new_window and cmd+shift+d=new_window_with_cwd into directional splits.
map cmd+d       launch --location=vsplit --cwd=current
map cmd+shift+d launch --location=hsplit --cwd=current

# Move focus between splits, vim-style.
map cmd+ctrl+h neighboring_window left
map cmd+ctrl+j neighboring_window down
map cmd+ctrl+k neighboring_window up
map cmd+ctrl+l neighboring_window right

# Resize the active split (cmd+r is unbound by default); then arrows/hjkl, Enter/Esc.
map cmd+r start_resize_window
