# kitty ssh kitten configuration.
# Applied by `kitten ssh` (and the `kssh` alias). Docs:
#   https://sw.kovidgoyal.net/kitty/kittens/ssh/
#
# NOTE: this is NOT ~/.ssh/config. OpenSSH still owns hostnames, ports and
# keys; this only controls what `kitten ssh` carries to the remote on connect.

hostname *

# Bring kitty's shell integration to the remote (prompt marks, jump-by-prompt,
# clipboard) even when kitty isn't installed there.
shell_integration enabled

# Lightweight, dependency-free configs copied to every host ($HOME-relative).
copy .vimrc
copy .editorconfig
copy .gitconfig
env EDITOR=vim

# Opt-in heavier setup (left commented). nvim bootstraps its plugins on first
# run; .zshrc needs Oh My Zsh + plugins present on the remote. Enable per host
# you control:
#
# hostname myhost-*
# copy .config/nvim .config/ripgrep .config/bat
# copy .zshrc .p10k.zsh .tmux.conf
# env EDITOR=nvim
