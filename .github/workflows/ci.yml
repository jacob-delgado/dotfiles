name: ci

# Lint every kind of file in the repo with the same configs the lefthook hooks
# and stowed rc files enforce locally. Scope is driven by `git ls-files`, so
# gitignored junk (vim persistent-undo files that end in .sh/.md/.yaml) is never
# linted.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Read-only: linting never needs to write to the repo.
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Binary linters from mise (aqua backend — pinned prebuilt binaries), the
      # same tool manager the rest of the repo uses. Versions match what the
      # tree was verified against.
      - name: Install binary linters (mise)
        uses: jdx/mise-action@v4
        with:
          mise_toml: |
            [tools]
            shellcheck = "0.11.0"
            shfmt = "3.13.1"
            taplo = "0.10.0"
            actionlint = "1.7.12"
            "editorconfig-checker" = "3.8.0"

      # Python/Node linters that aren't binaries. pipx and node ship on the
      # runner. mdformat needs its GFM + tables plugins injected into the same
      # environment so it aligns tables (what satisfies markdownlint's MD060).
      - name: Install yamllint, mdformat, markdownlint
        run: |
          pipx install yamllint==1.38.0
          pipx install mdformat==0.7.22
          pipx inject mdformat mdformat-gfm==1.0.0 mdformat-tables==1.0.0
          npm install -g markdownlint-cli2@0.22.1

      - name: shellcheck
        run: |
          cp shellcheck/.shellcheckrc "$HOME/.shellcheckrc"
          git ls-files '*.sh' '*.bash' | xargs -r shellcheck

      - name: shfmt
        run: git ls-files '*.sh' '*.bash' | xargs -r shfmt -d -i 2 -ci

      # gh generates ~/.config/gh/config.yml with its own 4-space indent, so
      # it's the one tracked YAML we don't own and don't lint.
      - name: yamllint
        run: |
          git ls-files '*.yml' '*.yaml' | grep -v '^gh/\.config/gh/config\.yml$' \
            | xargs -r yamllint -c yamllint/.config/yamllint/config

      - name: actionlint
        run: actionlint

      - name: taplo (format + lint)
        run: |
          git ls-files '*.toml' | xargs -r taplo fmt --check
          git ls-files '*.toml' | xargs -r taplo lint

      # markdownlint-cli2 reads .markdownlint-cli2.jsonc (rules + globs/ignores).
      - name: markdownlint
        run: markdownlint-cli2

      # mdformat is the Markdown formatter of record (reads .mdformat.toml); the
      # src/*.md mdBook include-wrappers aren't authored prose.
      - name: mdformat (check)
        run: git ls-files '*.md' | grep -v '^src/' | xargs -r mdformat --check

      # editorconfig-checker enforces .editorconfig. It reads
      # .editorconfig-checker.json for the vendored/generated excludes; the grep
      # keeps those out even when files are passed explicitly.
      - name: editorconfig-checker
        run: git ls-files | grep -vE '^(vim/\.vim/|p10k/\.p10k\.zsh$)' | xargs -r ec
